<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>temi</title>

<style>
:root {
    --accent: rgba(140, 200, 255, 0.4);
    --glass: rgba(0,0,0,0.6);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.6), rgba(0,0,0,.95)),
        url("https://images.unsplash.com/photo-1727950183920-654c2feee258?auto=format&fit=crop&w=2400&q=90");
    background-size: cover;
    background-position: center;
    font-family: system-ui, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
}

canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn { to { opacity: 1; } }

#pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,.6);
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
    margin-bottom: 22px;
}

.card {
    background: var(--glass);
    backdrop-filter: blur(22px);
    border-radius: 28px;
    padding: 42px 54px;
    text-align: center;
    color: white;
    box-shadow:
        0 25px 80px rgba(0,0,0,.75),
        inset 0 0 0 1px rgba(255,255,255,.08);
}

.bio {
    font-size: 24px;
    line-height: 1.5;
    margin-bottom: 18px;
}

#time {
    font-size: 18px;
    color: #bff;
    margin-bottom: 26px;
}

.icons {
    display: flex;
    justify-content: center;
    gap: 26px;
}

.icons img {
    width: 48px;
    filter: invert(1);
    transition: transform .2s, filter .2s;
}

.icons img:hover {
    transform: scale(1.18);
    filter: invert(1) drop-shadow(0 0 12px var(--accent));
}

#easter {
    position: fixed;
    bottom: 40px;
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity .6s ease;
}
</style>
</head>

<body>

<canvas id="fx"></canvas>

<img id="pfp" class="fade"
src="https://www.bing.com/th/id/OIP.0EMfS4vBWXE-HWQNHE8XGQHaJQ?w=181&h=211&c=8&rs=1&qlt=90&o=6&pid=3.1&rm=2">

<div class="card fade" id="card">
    <div class="bio">
        Hi, I'm temi,<br>
        Luau programmer & Video maker
    </div>

    <div id="time">Current time: --:--:--</div>

    <div class="icons">
        <a href="https://discord.com/users/1466129968940712286" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
        </a>
        <a href="https://www.roblox.com/users/5636025366/profile" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg">
        </a>
        <a href="https://www.youtube.com/@SnoozeSZ" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
        </a>
        <a href="https://github.com/coolytemi" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
        </a>
    </div>
</div>

<div id="easter">you found it.</div>

<script>
const card = document.getElementById("card");

function updateTime() {
    document.getElementById("time").textContent =
        "Current time: " + new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

document.addEventListener("mousemove", e => {
    const x = (e.clientX / innerWidth - .5) * 10;
    const y = (e.clientY / innerHeight - .5) * 10;
    card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
});

const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = Array.from({length: 140}, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6,
    size: Math.random() * 2 + 1
}));

function animate() {
