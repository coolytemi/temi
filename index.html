<!DOCTYPE html>
<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>temi</title>

<style>
:root {
    --accent: rgba(140, 200, 255, 0.4);
    --glass: rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.25), rgba(0,0,0,.8)),
        url("https://images.unsplash.com/photo-1727950183920-654c2feee258?auto=format&fit=crop&w=2400&q=90");
    background-size: cover;
    background-position: center;
    font-family: system-ui, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
}

canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn { to { opacity: 1; } }

#pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,.6);
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
    margin-bottom: 22px;
}

.card {
    background: var(--glass);
    backdrop-filter: blur(22px);
    border-radius: 28px;
    padding: 42px 54px;
    text-align: center;
    color: white;
    box-shadow:
        0 25px 80px rgba(0,0,0,.75),
        inset 0 0 0 1px rgba(255,255,255,.08);
    transform-style: preserve-3d;
    transition: transform .15s ease, box-shadow .4s ease;
}

.card.glow {
    box-shadow:
        0 0 40px var(--accent),
        0 25px 80px rgba(0,0,0,.75);
}

.bio {
    font-size: 24px;
    line-height: 1.5;
    margin-bottom: 18px;
}

#time {
    font-size: 18px;
    color: #bff;
    margin-bottom: 26px;
    transition: opacity .25s ease;
}

.icons {
    display: flex;
    justify-content: center;
    gap: 26px;
}

.icons img {
    width: 48px;
    filter: invert(1);
    transition: transform .2s, filter .2s;
}

.icons img:hover {
    transform: scale(1.18);
    filter: invert(1) drop-shadow(0 0 12px var(--accent));
}

.music {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    color: white;
}

.music-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at top, rgba(255,255,255,.15), rgba(0,0,0,.6));
    backdrop-filter: blur(14px);
    color: white;
    font-size: 20px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
    transition: transform .2s, box-shadow .3s;
}

.music-btn.playing {
    box-shadow: 0 0 30px var(--accent);
}

.music-btn:hover { transform: scale(1.12); }

#easter {
    position: fixed;
    bottom: 40px;
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity .6s ease;
}
</style>
</head>

<body onclick="startAudio()">

<canvas id="rain"></canvas>

<img id="pfp" class="fade" src="https://www.bing.com/th/id/OIP.0EMfS4vBWXE-HWQNHE8XGQHaJQ?w=181&h=211&c=8&rs=1&qlt=90&o=6&pid=3.1&rm=2">

<div class="card fade" id="card">
    <div class="bio">
        Hi, I'm temi,<br>
        Luau programmer & Video maker
    </div>

    <div id="time">Current time: --:--:--</div>

    <div class="icons">
        <a href="https://discord.com/users/1466129968940712286" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
        </a>
        <a href="https://www.roblox.com/users/5636025366/profile" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg">
        </a>
        <a href="https://www.youtube.com/@SnoozeSZ" target="_blank">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
        </a>
    </div>
</div>

<div class="music fade">
    <button id="musicBtn" class="music-btn">â–¶</button>
    <span>Solar Success</span>
</div>

<div id="easter">you found it.</div>

<audio id="audio" loop>
    <source src="SolarSucess.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("musicBtn");
const card = document.getElementById("card");
const easter = document.getElementById("easter");

function updateTime() {
    const el = document.getElementById("time");
    el.style.opacity = .4;
    setTimeout(() => {
        el.textContent = "Current time: " + new Date().toLocaleTimeString();
        el.style.opacity = 1;
    }, 150);
}
setInterval(updateTime, 1000);
updateTime();

function startAudio() {
    audio.play();
    btn.textContent = "â¸";
    btn.classList.add("playing");
    document.body.onclick = null;
}

btn.onclick = e => {
    e.stopPropagation();
    audio.paused ? audio.play() : audio.pause();
    btn.textContent = audio.paused ? "â–¶" : "â¸";
    btn.classList.toggle("playing", !audio.paused);
};

document.addEventListener("mousemove", e => {
    const x = (e.clientX / innerWidth - .5) * 10;
    const y = (e.clientY / innerHeight - .5) * 10;
    card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
});

/* Rain */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
let w, h;
function resize() {
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

const drops = Array.from({length: 220}, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    l: Math.random() * 20 + 10,
    s: Math.random() * 4 + 4
}));

function rain() {
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = "rgba(200,220,255,.25)";
    ctx.lineWidth = 1;
    drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.l);
        ctx.stroke();
        d.y += d.s;
        if (d.y > h) d.y = -20;
    });
    requestAnimationFrame(rain);
}
rain();

/* Easter Egg */
let seq = "";
document.addEventListener("keydown", e => {
    seq += e.key.toLowerCase();
    if (!"temi".startsWith(seq)) seq = "";
    if (seq === "temi") {
        card.classList.add("glow");
        easter.style.opacity = 1;
        setTimeout(() => {
            card.classList.remove("glow");
            easter.style.opacity = 0;
        }, 3000);
        seq = "";
    }
});
</script>

</body>
</html>
