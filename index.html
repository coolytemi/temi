<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>temi</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
}

#player {
    position: fixed;
    width: 300px;
    height: 200px;
    opacity: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        width: '300',
        height: '200',
        videoId: 'HJl-i58SuW4',
        playerVars: {
            autoplay: 0,
            controls: 0,
            disablekb: 1,
            loop: 1,
            playlist: 'HJl-i58SuW4'
        },
        events: {
            onReady: () => {
                console.log("Player ready");
            },
            onStateChange: enforcePlay
        }
    });
}

function enforcePlay() {
    if (player.getPlayerState() === YT.PlayerState.PAUSED) {
        player.playVideo();
    }
}

let started = false;

document.addEventListener("click", () => {
    if (!started && player) {
        player.unMute();
        player.playVideo();
        started = true;
    }
});
</script>

</body>
</html>
