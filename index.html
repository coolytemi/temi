<style>
:root {
    --accent: rgba(140, 200, 255, 0.4);
    --glass: rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.25), rgba(0,0,0,.8)),
        url("https://images.unsplash.com/photo-1727950183920-654c2feee258?auto=format&fit=crop&w=2400&q=90");
    background-size: cover;
    background-position: center;
    font-family: system-ui, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
}

/* smooth canvas */
canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn { to { opacity: 1; } }

/* PROFILE PICTURE HOVER */
#pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,.6);
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
    margin-bottom: 22px;
    transition: transform .3s ease, box-shadow .3s ease;
}

#pfp:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px var(--accent);
}

/* CARD HOVER */
.card {
    background: var(--glass);
    backdrop-filter: blur(22px);
    border-radius: 28px;
    padding: 42px 54px;
    text-align: center;
    color: white;
    box-shadow:
        0 25px 80px rgba(0,0,0,.75),
        inset 0 0 0 1px rgba(255,255,255,.08);
    transform-style: preserve-3d;
    transition: transform .3s ease, box-shadow .3s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow:
        0 30px 100px rgba(0,0,0,.85),
        0 0 35px var(--accent);
}

/* BIO */
.bio {
    font-size: 24px;
    line-height: 1.5;
    margin-bottom: 18px;
}

/* TIME */
#time {
    font-size: 18px;
    color: #bff;
    margin-bottom: 26px;
    transition: opacity .25s ease;
}

/* ICONS */
.icons {
    display: flex;
    justify-content: center;
    gap: 26px;
}

.icons img {
    width: 48px;
    filter: invert(1);
    transition: transform .25s ease, filter .25s ease;
}

/* ICON HOVER ANIMATION */
.icons img:hover {
    transform: scale(1.25) translateY(-4px) rotate(3deg);
    filter: invert(1) drop-shadow(0 0 14px var(--accent));
}

/* EASTER */
#easter {
    position: fixed;
    bottom: 40px;
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity .6s ease;
}
</style>
