<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>temi</title>

<style>
:root {
    --accent: rgba(140, 200, 255, 0.6);
    --glass: rgba(0,0,0,0.55);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: system-ui, Arial;
    user-select: none;

    background:
        radial-gradient(circle at center, rgba(0,0,0,.2), rgba(0,0,0,.85)),
        url("https://images.unsplash.com/photo-1727950183920-654c2feee258?auto=format&fit=crop&w=2400&q=90");
    background-size: cover;
    background-position: center;
}

/* 🌫 CINEMATIC VIGNETTE */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,.75));
    pointer-events: none;
}

/* 🌌 PARTICLES CANVAS */
canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

/* FADE IN */
.fade {
    opacity: 0;
    animation: fadeIn 1.5s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

/* 🧊 PROFILE */
#pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.6);
    box-shadow: 0 0 25px rgba(140,200,255,.25);
    margin-bottom: 20px;
    transition: transform .4s ease, box-shadow .4s ease;
}

#pfp:hover {
    transform: scale(1.1) rotate(2deg);
    box-shadow: 0 0 40px var(--accent);
}

/* 🧠 CARD (3D PARALLAX FEEL) */
.card {
    background: var(--glass);
    backdrop-filter: blur(25px);
    border-radius: 30px;
    padding: 42px 54px;
    text-align: center;
    color: white;

    box-shadow:
        0 30px 100px rgba(0,0,0,.8),
        inset 0 0 0 1px rgba(255,255,255,.1);

    transform-style: preserve-3d;
    transition: transform .2s ease, box-shadow .4s ease;
}

/* FLOAT EFFECT */
.card:hover {
    box-shadow:
        0 40px 120px rgba(0,0,0,.9),
        0 0 40px var(--accent);
}

/* TEXT */
.bio {
    font-size: 24px;
    line-height: 1.5;
    margin-bottom: 16px;
    text-shadow: 0 0 10px rgba(140,200,255,.2);
}

#time {
    font-size: 18px;
    color: #bff;
    margin-bottom: 24px;
    transition: opacity .3s ease;
}

/* 🌐 ICONS */
.icons {
    display: flex;
    justify-content: center;
    gap: 26px;
}

.icons img {
    width: 48px;
    filter: invert(1);
    transition: transform .25s ease, filter .25s ease;
}

/* 💥 INSANE HOVER */
.icons img:hover {
    transform:
        scale(1.3)
        translateY(-6px)
        rotate(-5deg);

    filter:
        invert(1)
        drop-shadow(0 0 18px var(--accent))
        drop-shadow(0 0 30px rgba(140,200,255,.3));
}

/* ✨ EASTER */
#easter {
    position: fixed;
    bottom: 40px;
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity .5s ease;
    text-shadow: 0 0 15px var(--accent);
}
</style>
</head>

<body>

<canvas id="fx"></canvas>

<img id="pfp" class="fade"
src="https://www.bing.com/th/id/OIP.0EMfS4vBWXE-HWQNHE8XGQHaJQ?w=181&h=211&c=8&rs=1">

<div class="card fade" id="card">
    <div class="bio">
        Hi, I'm temi,<br>
        Luau programmer & Video maker
    </div>

    <div id="time">Loading time...</div>

    <div class="icons">
        <a href="https://discord.com/users/1466129968940712286"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg"></a>
        <a href="https://www.roblox.com/users/5636025366/profile"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg"></a>
        <a href="https://www.youtube.com/@SnoozeSZ"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></a>
        <a href="https://github.com/coolytemi"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"></a>
    </div>
</div>

<div id="easter">you found it.</div>

<script>
const card = document.getElementById("card");

/* ⏰ TIME */
function updateTime(){
    document.getElementById("time").textContent =
    "Current time: " + new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

/* 🧠 PARALLAX */
document.addEventListener("mousemove", e=>{
    const x = (e.clientX / innerWidth - .5) * 12;
    const y = (e.clientY / innerHeight - .5) * 12;
    card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
});

/* 🌌 PARTICLES */
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

const dots = Array.from({length: 80}, ()=>({
    x: Math.random()*w,
    y: Math.random()*h,
    s: Math.random()*2+1
}));

function draw(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "rgba(140,200,255,.4)";

    dots.forEach(d=>{
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.s,0,Math.PI*2);
        ctx.fill();

        d.y += d.s*0.6;
        if(d.y>h) d.y=0;
    });

    requestAnimationFrame(draw);
}
draw();

/* 🎮 SECRET */
let seq="";
document.addEventListener("keydown",e=>{
    seq += e.key.toLowerCase();
    if(!"temi".startsWith(seq)) seq="";
    if(seq==="temi"){
        card.style.boxShadow="0 0 60px rgba(140,200,255,.6)";
        document.getElementById("easter").style.opacity=1;

        setTimeout(()=>{
            document.getElementById("easter").style.opacity=0;
            card.style.boxShadow="";
        },3000);

        seq="";
    }
});
</script>

</body>
</html>
